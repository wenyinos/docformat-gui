name: Build and Release

# === 关键修复：添加此权限声明 ===
permissions:
  contents: write
# ==============================

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-docx pywin32

      - name: Build Windows executable
        run: |
          $docxPath = python -c "import docx, os; print(os.path.join(os.path.dirname(docx.__file__), 'templates'))"
          echo "docx templates path: $docxPath"
          pyinstaller --onefile --windowed --name=docformat_windows --icon assets/icon.ico --add-data "scripts;scripts" --add-data "${docxPath};docx/templates" --hidden-import=docx --hidden-import=lxml --hidden-import=pythoncom --hidden-import=pywintypes docformat_gui.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/docformat_windows.exe

  build-windows-win7:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-win7.txt

      - name: Build Windows 7 compatible executable
        run: |
          $docxPath = python -c "import docx, os; print(os.path.join(os.path.dirname(docx.__file__), 'templates'))"
          echo "docx templates path: $docxPath"
          pyinstaller --onefile --windowed --name=docformat_windows_win7 `
            --icon assets/icon.ico `
            --add-data "scripts;scripts" `
            --add-data "${docxPath};docx/templates" `
            --hidden-import=docx --hidden-import=lxml `
            --hidden-import=pythoncom --hidden-import=pywintypes `
            docformat_gui.py

      - name: Upload Windows 7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-win7-build
          path: dist/docformat_windows_win7.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-docx

      - name: Build Linux executable
        run: |
          DOCX_TEMPLATES=$(python3 -c "import docx, os; print(os.path.join(os.path.dirname(docx.__file__), 'templates'))")
          pyinstaller --onefile --name=docformat_linux \
            --add-data "scripts:scripts" \
            --add-data "${DOCX_TEMPLATES}:docx/templates" \
            --hidden-import=docx --hidden-import=lxml \
            docformat_gui.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/docformat_linux

  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-docx

      - name: Build Linux ARM64 executable
        run: |
          DOCX_TEMPLATES=$(python3 -c "import docx, os; print(os.path.join(os.path.dirname(docx.__file__), 'templates'))")
          pyinstaller --onefile --name=docformat_linux_arm64 \
            --add-data "scripts:scripts" \
            --add-data "${DOCX_TEMPLATES}:docx/templates" \
            --hidden-import=docx --hidden-import=lxml \
            docformat_gui.py

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-build
          path: dist/docformat_linux_arm64

  build-macos:
    name: build-macos (${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_label: intel
            runner: macos-26-intel
            output_name: docformat_macos_intel
            artifact_name: macos-intel-build
          - arch_label: apple-silicon
            runner: macos-26
            output_name: docformat_macos_apple_silicon
            artifact_name: macos-apple-silicon-build
    env:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
      MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-docx

      - name: Import Apple Developer ID certificate
        if: env.MACOS_CERTIFICATE_BASE64 != '' || env.MACOS_CERT_P12_BASE64 != ''
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="${MACOS_KEYCHAIN_PASSWORD:-temporary-keychain-password}"
          CERTIFICATE_BASE64="${MACOS_CERTIFICATE_BASE64:-$MACOS_CERT_P12_BASE64}"
          CERTIFICATE_PASSWORD="${MACOS_CERTIFICATE_PASSWORD:-$MACOS_CERT_P12_PASSWORD}"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build macOS DMG
        run: |
          if [ -n "$MACOS_NOTARY_APPLE_ID" ] && [ -n "$MACOS_NOTARY_TEAM_ID" ] && [ -n "$MACOS_NOTARY_PASSWORD" ]; then
            export MACOS_REQUIRE_NOTARIZATION=1
            echo "Notarization credentials detected; notarization is required for this macOS build."
          else
            export MACOS_REQUIRE_NOTARIZATION=0
            echo "::warning::Notarization secrets are incomplete; building a signed but non-notarized macOS DMG."
          fi
          python build.py macos
        env:
          MACOS_OUTPUT_NAME: ${{ matrix.output_name }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.output_name }}.dmg
            dist/${{ matrix.output_name }}.app
            dist/${{ matrix.output_name }}

  release:
    needs: [build-windows, build-windows-win7, build-linux, build-linux-arm64, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/
      - name: Download Windows 7 artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-win7-build
          path: dist/
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist/
      - name: Download Linux ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-build
          path: dist/
      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-intel-build
          path: dist/
      - name: Download macOS Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-apple-silicon-build
          path: dist/

      - name: List dist contents
        run: ls -laR dist/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: 公文格式处理工具 ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Windows 10/11 版下载
            
            👉 [docformat_windows.exe](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/docformat_windows.exe)
            
            ## Windows 7/8 兼容版下载
            
            👉 [docformat_windows_win7.exe](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/docformat_windows_win7.exe)
            
            > ⚠️ Win7 用户请下载此版本，需要 Windows 7 SP1 及以上。如果闪退请安装 [Visual C++ Redistributable](https://aka.ms/vs/17/release/vc_redist.x64.exe)
            
            ## Linux 版下载（国产系统 / 麒麟 / 统信 UOS）
            
            先查询架构：在终端运行 `uname -m`
            
            输出 `x86_64`：下载 x86_64 版本  
            输出 `aarch64` 或 `arm64`：下载 ARM64 版本
            
            x86_64（Intel/AMD）：[docformat_linux](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/docformat_linux)  
            ARM64（飞腾/鲲鹏/龙芯3A5000+）：[docformat_linux_arm64](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/docformat_linux_arm64)
            
            运行步骤：
            1. `chmod +x docformat_linux`（或 `chmod +x docformat_linux_arm64`）
            2. `./docformat_linux`
            3. 如果运行报错，请使用 [install.sh 脚本方式](https://github.com/${{ github.repository }}#国产系统用户麒麟--统信-uos)
            
            仅支持 `.docx` 文件。
            
            ## macOS 版下载
            
            Intel 芯片：[docformat_macos_intel.dmg](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/docformat_macos_intel.dmg)
            Apple Silicon（M 系列）：[docformat_macos_apple_silicon.dmg](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/docformat_macos_apple_silicon.dmg)
            
            **macOS 运行说明**：
            1. 双击 `.dmg` 文件挂载
            2. 将应用拖入"应用程序"文件夹，或直接双击运行
            3. 首次打开如提示"无法验证开发者"，请到 系统设置 → 隐私与安全性 → 仍要打开
            4. 仅支持 `.docx` 文件（macOS 不支持 .doc/.wps 转换）
            
            ## 使用说明
            
            1. 下载对应系统的文件
            2. 双击运行
            3. 选择要处理的 .docx 文件
            4. 点击「开始处理」
            
            ## 功能
            
            - ✅ 智能一键处理（标点修复 + 格式统一）
            - ✅ 格式诊断（仅分析，不修改）
            - ✅ 标点符号修复
            - ✅ 支持 GB/T 公文标准
            
          files: |
            dist/docformat_windows.exe
            dist/docformat_windows_win7.exe
            dist/docformat_linux
            dist/docformat_linux_arm64
            dist/docformat_macos_intel.dmg
            dist/docformat_macos_apple_silicon.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
